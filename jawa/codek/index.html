<!DOCTYPE html>
<html>
<head>
    <title>JAWA Smart Aggregator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .website-selector {
            margin-bottom: 20px;
        }

        .website-selector h3 {
            margin-bottom: 12px;
            color: #333;
            font-size: 1.1em;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        label {
            cursor: pointer;
            font-size: 15px;
            color: #333;
        }

        #loading {
            display: none;
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results {
            display: grid;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border-left: 5px solid #667eea;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .card p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .card small {
            color: #999;
            font-size: 0.9em;
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-top: 20px;
        }

        .no-results {
            background: #f0f0f0;
            color: #666;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 JAWA Smart Aggregator</h1>

    <div class="search-section">
        <div class="input-group">
            <input type="text" id="topic" placeholder="Enter topic to search..." value="AI">
            <button onclick="search()">Search</button>
        </div>

        <div class="website-selector">
            <h3>Select Websites:</h3>
            <div class="checkbox-group" id="websiteList"></div>
        </div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        Searching across websites...
    </div>

    <div id="results"></div>
</div>

<script>
let websites = [];
let selectedWebsites = [];

// Load available websites
async function loadWebsites() {
    try {
        const response = await fetch("http://localhost:8000/websites");
        const data = await response.json();
        websites = data.websites;
        
        // Create checkboxes
        const websiteList = document.getElementById("websiteList");
        websites.forEach(site => {
            if (site.enabled) {
                const wrapper = document.createElement("div");
                wrapper.className = "checkbox-wrapper";
                
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.id = "site_" + site.id;
                checkbox.value = site.id;
                checkbox.checked = true;
                checkbox.onchange = updateSelectedSites;
                
                const label = document.createElement("label");
                label.htmlFor = "site_" + site.id;
                label.textContent = site.name;
                
                wrapper.appendChild(checkbox);
                wrapper.appendChild(label);
                websiteList.appendChild(wrapper);
                
                selectedWebsites.push(site.id);
            }
        });
    } catch (error) {
        console.error("Error loading websites:", error);
    }
}

// Update selected websites array
function updateSelectedSites() {
    selectedWebsites = [];
    document.querySelectorAll("input[type='checkbox']:checked").forEach(checkbox => {
        selectedWebsites.push(checkbox.value);
    });
}

// Perform search
async function search() {
    const topic = document.getElementById("topic").value || "AI";
    
    if (selectedWebsites.length === 0) {
        document.getElementById("results").innerHTML = '<div class="error">Please select at least one website</div>';
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("results").innerHTML = "";

    try {
        const sitesParam = selectedWebsites.join(",");
        const response = await fetch(`http://localhost:8000/search?topic=${encodeURIComponent(topic)}&sites=${encodeURIComponent(sitesParam)}`);
        const data = await response.json();

        setTimeout(() => {
            document.getElementById("loading").style.display = "none";

            if (!data.results || data.results.length === 0) {
                document.getElementById("results").innerHTML = '<div class="no-results">No results found. Try a different search term.</div>';
                return;
            }

            let output = "";
            data.results.forEach(item => {
                if (item.title && !item.title.includes("Error")) {
                    output += `
                        <div class="card">
                            <h2>${escapeHtml(item.title)}</h2>
                            <p>${escapeHtml(item.content)}</p>
                            <small>📍 ${escapeHtml(item.source)}</small>
                        </div>
                    `;
                }
            });

            if (output === "") {
                document.getElementById("results").innerHTML = '<div class="no-results">No valid results found.</div>';
            } else {
                document.getElementById("results").innerHTML = output;
            }
        }, 500);

    } catch (error) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("results").innerHTML = '<div class="error">Error fetching data: ' + error.message + '</div>';
    }
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// Allow Enter key to search
document.addEventListener("DOMContentLoaded", () => {
    loadWebsites();
    document.getElementById("topic").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            search();
        }
    });
});
</script>

</body>
</html>
